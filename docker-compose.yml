version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mocktest-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - mocktest-network

  backend:
    build: ./backend
    container_name: mocktest-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/mocktest-db
      - JWT_SECRET=mocktest-access-super-secret-2026-changeme
      - JWT_REFRESH_SECRET=mocktest-refresh-super-secret-2026-changeme
    depends_on:
      - mongodb
    networks:
      - mocktest-network

  frontend:
    build: ./frontend
    container_name: mocktest-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mocktest-network

networks:
  mocktest-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
